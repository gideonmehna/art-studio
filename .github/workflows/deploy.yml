name: Deploy to Hostinger STAGING

# Deploys to STAGING only (art.pipostudio.com).
# Target path is hardcoded — this workflow can NEVER deploy to the live site.
# Live site (pipostudio.com) must be updated manually and deliberately.
on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Sync plugin to Hostinger STAGING via rsync
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          # Add Hostinger host to known_hosts to avoid interactive prompt.
          ssh-keyscan -p 65002 -H "${{ secrets.HOSTINGER_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy via rsync to STAGING
        run: |
          rsync -avz --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='*.md' \
            --exclude='.gitignore' \
            -e "ssh -p 65002 -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" \
            ./ \
            "${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:/home/u100806884/domains/pipostudio.com/public_html/art/wp-content/plugins/art-studio/"

      - name: Confirm deployment
        run: echo "Deployed to STAGING (art.pipostudio.com). Live site untouched."
